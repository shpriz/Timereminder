services:
  reminder:
    build: .
    container_name: narfu-reminder
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=Europe/Moscow
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SMTP_HOST=${SMTP_HOST:-smtp.yandex.ru}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - DEFAULT_GROUP=${DEFAULT_GROUP:-19624}
